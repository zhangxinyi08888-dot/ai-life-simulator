<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我用20年证明：不追风口的人，反而赚到了钱</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}.poster{width:390px;height:693px;padding:22px;border-radius:28px;background:linear-gradient(145deg,#020617,#09090b,#171717);color:#f8fafc;display:flex;flex-direction:column;overflow:hidden}.label{display:flex;justify-content:space-between;color:#cbd5e1;font-size:10px;font-weight:700;letter-spacing:.18em}.title{margin:24px 0 12px;font-size:30px;line-height:1.12;font-weight:900}.badge{display:inline-flex;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:5px 12px;color:#cbd5e1;font-size:12px;font-weight:700}.summary{margin:12px 0 0;color:#cbd5e1;font-size:15px;line-height:1.65;font-weight:600}.timeline{margin-top:18px;border-top:1px solid rgba(255,255,255,.16);padding-top:14px}.hint{color:#cbd5e1;font-size:11px;font-weight:700}.item{display:grid;grid-template-columns:50px 24px 1fr;gap:8px;margin-top:11px;align-items:start}.age{font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace}.icon{font-size:15px}.item-title{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.choice{color:#cbd5e1;font-size:11px;line-height:1.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.closing{margin-top:auto;border-top:1px solid rgba(255,255,255,.16);padding-top:14px;font-size:15px;line-height:1.5;font-weight:900}
</style>
</head>
<body>
  <main class="poster">
    <div class="label"><span>AI 给我的人生写了一个结局</span><span>✦</span></div>
    <section>
      <h1 class="title">我用20年证明：不追风口的人，反而赚到了钱</h1>
      <div class="badge">逆风守成者</div>
      <p class="summary">你的人生是一场用纪律对抗冲动的漫长实验，最终用保守换来了最稳的复利。</p>
    </section>
    <section class="timeline">
      <div class="hint">AI认为，这几次选择塑造了今天的你。</div>
      <div class="item"><div class="age">30岁</div><div class="icon">🎢</div><div><div class="item-title">风口前的摇摆</div><div class="choice">在All in和观望间，选择了小额试错</div></div></div><div class="item"><div class="age">32岁</div><div class="icon">😰</div><div><div class="item-title">错过暴涨的焦虑</div><div class="choice">忍受周围人的狂欢，坚持不追高</div></div></div><div class="item"><div class="age">35岁</div><div class="icon">🏠</div><div><div class="item-title">重建安全边界</div><div class="choice">把副业与投资分离，先存够风险垫</div></div></div><div class="item"><div class="age">39岁</div><div class="icon">🔭</div><div><div class="item-title">只做懂的事情</div><div class="choice">放弃看不懂的风口，深耕自己领域</div></div></div><div class="item"><div class="age">45岁</div><div class="icon">⚖️</div><div><div class="item-title">用纪律替代冲动</div><div class="choice">财富增长不戏剧，但家庭与健康保全</div></div></div>
    </section>
    <footer class="closing">人生不是由成功组成，而是由一次次选择组成。</footer>
  </main>
</body>
</html>
