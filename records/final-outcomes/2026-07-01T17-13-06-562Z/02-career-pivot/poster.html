<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我用10年低薪换来一条护城河，然后行业塌了</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}.poster{width:390px;height:693px;padding:22px;border-radius:28px;background:linear-gradient(145deg,#0c0a09,#020617,#052e2b);color:#f8fafc;display:flex;flex-direction:column;overflow:hidden}.label{display:flex;justify-content:space-between;color:#cbd5e1;font-size:10px;font-weight:700;letter-spacing:.18em}.title{margin:24px 0 12px;font-size:30px;line-height:1.12;font-weight:900}.badge{display:inline-flex;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:5px 12px;color:#cbd5e1;font-size:12px;font-weight:700}.summary{margin:12px 0 0;color:#cbd5e1;font-size:15px;line-height:1.65;font-weight:600}.timeline{margin-top:18px;border-top:1px solid rgba(255,255,255,.16);padding-top:14px}.hint{color:#cbd5e1;font-size:11px;font-weight:700}.item{display:grid;grid-template-columns:50px 24px 1fr;gap:8px;margin-top:11px;align-items:start}.age{font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace}.icon{font-size:15px}.item-title{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.choice{color:#cbd5e1;font-size:11px;line-height:1.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.closing{margin-top:auto;border-top:1px solid rgba(255,255,255,.16);padding-top:14px;font-size:15px;line-height:1.5;font-weight:900}
</style>
</head>
<body>
  <main class="poster">
    <div class="label"><span>AI 给我的人生写了一个结局</span><span>✦</span></div>
    <section>
      <h1 class="title">我用10年低薪换来一条护城河，然后行业塌了</h1>
      <div class="badge">慢火熬成匠</div>
      <p class="summary">你一次次用短期的稳定换长期的成长，却在行业下行时发现，最大的护城河不是经验，而是你能不…</p>
    </section>
    <section class="timeline">
      <div class="hint">AI认为，这几次选择塑造了今天的你。</div>
      <div class="item"><div class="age">22岁</div><div class="icon">🎓</div><div><div class="item-title">拒绝铁饭碗，跳进小团队</div><div class="choice">放弃稳定offer，进入新行业实习</div></div></div><div class="item"><div class="age">24岁</div><div class="icon">🛠️</div><div><div class="item-title">低薪但高速成长</div><div class="choice">留在小团队磨作品，补齐项目能力</div></div></div><div class="item"><div class="age">27岁</div><div class="icon">🚀</div><div><div class="item-title">用作品换平台</div><div class="choice">凭作品集跳槽，承担管理责任</div></div></div><div class="item"><div class="age">31岁</div><div class="icon">🌪️</div><div><div class="item-title">行业下行，团队缩编</div><div class="choice">保住核心能力，准备转型</div></div></div><div class="item"><div class="age">34岁</div><div class="icon">💡</div><div><div class="item-title">经验产品化</div><div class="choice">转向顾问型工作，做可复用方法</div></div></div>
    </section>
    <footer class="closing">人生不是由成功组成，而是由一次次选择组成。</footer>
  </main>
</body>
</html>
